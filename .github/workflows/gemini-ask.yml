name: Gemini

on:
  workflow_dispatch:
    inputs:
      question:
        description: 'سوال خود را بنویسید'
        required: true
        type: string

jobs:
  ask:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Call Gemini API
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          QUESTION: ${{ github.event.inputs.question }}
        run: |
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          mkdir -p "answers"

          # ساخت JSON با استفاده از printf و فرار از کاراکترهای خاص
          printf '{
            "contents": [{
              "parts": [{"text": "%s"}]
            }]
          }' "$QUESTION" > request.json

          echo "📤 ارسال درخواست به Gemini..."
          curl -s -X POST \
            "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=$GEMINI_API_KEY" \
            -H "Content-Type: application/json" \
            -d @request.json \
            > answers/response.json

          # استخراج پاسخ با jq (اگر نصب نبود، نصب کن)
          sudo apt-get update && sudo apt-get install -y jq
          
          if jq -e '.error' answers/response.json > /dev/null 2>&1; then
            echo "❌ خطا از سمت API:" > answers/answer.txt
            jq -r '.error.message' answers/response.json >> answers/answer.txt
          else
            jq -r '.candidates[0].content.parts[0].text' answers/response.json > answers/answer.txt
          fi

          # نمایش پاسخ
          echo "========== پاسخ =========="
          cat answers/answer.txt
          echo "=========================="

          # ذخیره در فایل README
          cat > answers/README.md << EOF
# 🤖 پاسخ Gemini

**سوال:** ${{ github.event.inputs.question }}

**پاسخ:**
$(cat answers/answer.txt)

---
تاریخ: $(date)
EOF

          # آپلود
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add answers/
          git commit -m "Gemini answer: ${{ github.event.inputs.question }}" || echo "No changes"
          git push
