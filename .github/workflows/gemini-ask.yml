name: Gemini Q&A

on:
  workflow_dispatch:
    inputs:
      question:
        description: 'سوال خود را بنویسید'
        required: true
        type: string

jobs:
  ask-gemini:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: نصب ابزارها
        run: sudo apt-get update && sudo apt-get install -y curl

      - name: دریافت پاسخ از Gemini
        run: |
          QUESTION="${{ github.event.inputs.question }}"
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          SAFE_NAME=$(echo "$QUESTION" | cut -c1-20 | sed 's/[^a-zA-Z0-9]/_/g')
          OUTPUT_DIR="gemini_answers/${SAFE_NAME}_${TIMESTAMP}"
          mkdir -p "$OUTPUT_DIR"

          echo "$QUESTION" > "$OUTPUT_DIR/question.txt"

          # ساخت JSON ساده با echo
          cat > request.json << JSON
          {
            "contents": [{
              "parts": [{"text": "$QUESTION"}]
            }]
          }
          JSON

          API_KEY="${{ secrets.GEMINI_API_KEY }}"
          curl -s -X POST \
            "https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=$API_KEY" \
            -H "Content-Type: application/json" \
            -d @request.json > "$OUTPUT_DIR/raw_response.json"

          # استخراج پاسخ با grep و sed ساده
          cat "$OUTPUT_DIR/raw_response.json" | grep -o '"text":"[^"]*"' | head -1 | sed 's/"text":"//' | sed 's/"$//' > "$OUTPUT_DIR/answer.txt"

          # اگه خطا بود
          if grep -q "error" "$OUTPUT_DIR/raw_response.json"; then
            echo "خطا: پاسخ دریافت نشد" >> "$OUTPUT_DIR/answer.txt"
          fi

          # ساخت README
          echo "# Gemini Answer" > "$OUTPUT_DIR/README.md"
          echo "" >> "$OUTPUT_DIR/README.md"
          echo "**Question:**" >> "$OUTPUT_DIR/README.md"
          echo "$QUESTION" >> "$OUTPUT_DIR/README.md"
          echo "" >> "$OUTPUT_DIR/README.md"
          echo "**Answer:**" >> "$OUTPUT_DIR/README.md"
          cat "$OUTPUT_DIR/answer.txt" >> "$OUTPUT_DIR/README.md"
          echo "" >> "$OUTPUT_DIR/README.md"
          echo "---" >> "$OUTPUT_DIR/README.md"
          echo "Date: $(date)" >> "$OUTPUT_DIR/README.md"

          # ساخت ZIP
          cd gemini_answers && zip -r "${SAFE_NAME}_${TIMESTAMP}.zip" "${SAFE_NAME}_${TIMESTAMP}" && cd ..

          echo "OUTPUT_DIR=$OUTPUT_DIR" >> $GITHUB_ENV

      - name: آپلود
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add gemini_answers/
          git commit -m "Add Gemini Q&A" || echo "Nothing to commit"
          git pull --rebase origin ${{ github.ref_name }} || true
          git push origin HEAD:${{ github.ref_name }}

      - name: نمایش نتیجه
        run: |
          echo "========== ANSWER =========="
          cat "${{ env.OUTPUT_DIR }}/answer.txt"
          echo "============================"
